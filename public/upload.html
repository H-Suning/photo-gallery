<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传照片</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m3 16 5-5 3 3 4-4 6 6"/></svg>
      我的图库
    </a>
    <button class="mobile-menu-btn" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/upload" class="active">上传</a>
      <a href="/manage">管理</a>
    </div>
  </nav>

  <main class="main-content">
    <div class="upload-page">
      <div class="page-header" style="padding:0;margin-bottom:0">
        <h1>上传照片</h1>
        <p>支持 JPG / PNG / WebP / GIF，最多 50 张</p>
      </div>

      <div class="upload-area" id="uploadArea">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <h3>点击选择照片 或 拖拽到此处</h3>
        <p>支持手机相册 / 电脑文件上传</p>
        <input type="file" id="fileInput" multiple accept="image/*" capture="environment">
      </div>

      <div class="upload-preview" id="uploadPreview" style="display:none">
        <h3>已选择 <span id="fileCount">0</span> 张</h3>
        <div class="preview-grid" id="previewGrid"></div>
        <button class="btn btn-primary" id="uploadBtn" onclick="startUpload()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          上传到云端
        </button>
        <div class="upload-progress" id="uploadProgress"><div class="bar" id="progressBar"></div></div>
        <div class="upload-status" id="uploadStatus"></div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="/js/upload.js"></script>
</body>
</html>
