<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的图库</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m3 16 5-5 3 3 4-4 6 6"/></svg>
      我的图库
    </a>
    <button class="mobile-menu-btn" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
    <div class="nav-links">
      <a href="/" class="active">首页</a>
      <a href="/upload">上传</a>
      <a href="/manage">管理</a>
    </div>
  </nav>

  <main class="main-content">
    <!-- 3D Carousel Section -->
    <section class="carousel-3d-section" id="carouselSection">
      <h2>✨ 精选照片</h2>
      <div class="carousel-3d" id="carousel3d" style="display:none">
        <div class="carousel-3d-stage" id="carouselStage"></div>
        <button class="carousel-3d-btn prev" id="carouselPrev">‹</button>
        <button class="carousel-3d-btn next" id="carouselNext">›</button>
      </div>
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m3 16 5-5 3 3 4-4 6 6"/></svg>
        <h3>还没有照片</h3>
        <p>上传你的第一张照片，开启专属图库之旅</p>
        <a href="/upload" class="btn btn-primary">上传照片</a>
      </div>
    </section>

    <!-- Year Timeline Section -->
    <section class="year-section" id="yearSection" style="display:none">
      <div class="year-timeline" id="yearTimeline"></div>
      <div class="year-photo-grid" id="yearPhotoGrid"></div>
    </section>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <button class="lightbox-nav prev" onclick="navigateLightbox(-1)">‹</button>
    <button class="lightbox-nav next" onclick="navigateLightbox(1)">›</button>
    <div class="lightbox-img-wrap">
      <img id="lightboxImg" src="" alt="">
    </div>
    <div class="lightbox-info" id="lightboxInfo"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/gallery.js"></script>
</body>
</html>
