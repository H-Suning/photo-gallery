<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理图库</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m3 16 5-5 3 3 4-4 6 6"/></svg>
      我的图库
    </a>
    <button class="mobile-menu-btn" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/upload">上传</a>
      <a href="/manage" class="active">管理</a>
    </div>
  </nav>

  <main class="main-content">
    <div class="manage-page">
      <div class="mg-toolbar">
        <div class="mg-toolbar-left">
          <h1 style="font-size:22px;font-weight:700;color:#0f172a">管理图库</h1>
          <span class="mg-stats" id="mgStats"></span>
        </div>
        <div class="mg-toolbar-right" id="mgToolbar">
          <button class="btn btn-secondary btn-sm" id="selectAllBtn" onclick="toggleSelectAll()">全选</button>
          <button class="btn btn-primary btn-sm" onclick="shareSelected()">分享</button>
          <button class="btn btn-primary btn-sm" onclick="downloadSelected()">批量下载</button>
          <button class="btn btn-secondary btn-sm" onclick="saveOrder()">保存排序</button>
          <button class="btn btn-danger btn-sm" onclick="deleteSelected()">删除</button>
        </div>
      </div>
      <div class="photo-grid" id="photoGrid">
        <div class="empty-state" style="grid-column:1/-1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m3 16 5-5 3 3 4-4 6 6"/></svg>
          <h3>还没有照片</h3>
          <p>去上传页面添加你的第一张照片</p>
          <a href="/upload" class="btn btn-primary">上传照片</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Share Modal -->
  <div class="modal-overlay" id="shareModal">
    <div class="modal">
      <h3>分享相册</h3>
      <p>将选中的照片分享给好友，复制链接发送即可</p>
      <div class="share-link-box">
        <input type="text" id="shareLinkInput" readonly>
        <button onclick="copyShareLink()">复制链接</button>
      </div>
      <button class="btn-close-modal" onclick="closeShareModal()">关闭</button>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <button class="lightbox-nav prev" onclick="navigateLightbox(-1)">‹</button>
    <button class="lightbox-nav next" onclick="navigateLightbox(1)">›</button>
    <div class="lightbox-img-wrap">
      <img id="lightboxImg" src="" alt="">
    </div>
    <div class="lightbox-info" id="lightboxInfo"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/manage.js"></script>
</body>
</html>
